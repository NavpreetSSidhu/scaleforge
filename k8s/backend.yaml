# Build the backend image:
#   docker build -t scaleforge-backend:latest ./backend
# Then push to your registry and update the image field below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaleforge-backend
  namespace: scaleforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scaleforge-backend
  template:
    metadata:
      labels:
        app: scaleforge-backend
    spec:
      containers:
        - name: backend
          image: scaleforge-backend:latest   # replace with your registry path
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GIN_MODE
              value: release
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@postgres:5432/scaleforge?sslmode=disable
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: scaleforge-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scaleforge-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scaleforge-secrets
                  key: jwt-secret
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scaleforge-secrets
                  key: groq-api-key
                  optional: true
            - name: CORS_ORIGIN
              value: "https://scaleforge.example.com"   # update to your domain
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scaleforge-backend
  namespace: scaleforge
spec:
  selector:
    app: scaleforge-backend
  ports:
    - port: 8080
      targetPort: 8080
