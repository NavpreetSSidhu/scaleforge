services:
  postgres:
    image: postgres:16-alpine
    container_name: scaleforge-postgres
    environment:
      POSTGRES_USER: scaleforge
      POSTGRES_PASSWORD: scaleforge
      POSTGRES_DB: scaleforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scaleforge -d scaleforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: scaleforge-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
