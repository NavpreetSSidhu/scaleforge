services:
  postgres:
    image: postgres:16-alpine
    container_name: scaleforge-postgres
    environment:
      POSTGRES_USER: scaleforge
      POSTGRES_PASSWORD: scaleforge
      POSTGRES_DB: scaleforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scaleforge -d scaleforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scaleforge-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GIN_MODE: debug
      DATABASE_URL: postgres://scaleforge:scaleforge@postgres:5432/scaleforge?sslmode=disable
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: dev-insecure-secret-change-me
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ASSIST_MODEL: ${ASSIST_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scaleforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    container_name: scaleforge-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
